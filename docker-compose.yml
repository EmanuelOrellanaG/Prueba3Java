services:

  mysql:
    image: mysql:8.0
    container_name: ecommerce-mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce_db

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - ecommerce-network


  usuarios:
    build:
      context: ./UsuarioEcommerce-main/UsuarioEcommerce-main/usuarios/usuarios

    container_name: usuarios-service

    ports:
      - "8081:8081"

    depends_on:
      - mysql

    networks:
      - ecommerce-network


volumes:
  mysql_data:


networks:
  ecommerce-network:
    driver: bridge
