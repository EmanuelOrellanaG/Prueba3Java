name: Deploy Usuarios

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted  # Usa tu servidor EC2 Ubuntu

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Compilar proyecto con Maven
        working-directory: ./UsuarioEcommerce-main/UsuarioEcommerce-main/usuarios/usuarios
        run: mvn clean package -DskipTests

      - name: Crear paquete ZIP optimizado para AWS Lambda
        working-directory: ./UsuarioEcommerce-main/UsuarioEcommerce-main/usuarios/usuarios
        run: |
          # Nos movemos a la carpeta de salida de Maven
          cd target
          
          # Descomprimimos el JAR pesado en una carpeta temporal
          mkdir -p lambda_package
          unzip -q *.jar -d lambda_package/
          
          # Entramos a la carpeta y comprimimos todo el contenido en un archivo .zip limpio
          cd lambda_package
          zip -r ../lambda_deploy.zip .
          
          echo "¡Archivo ZIP creado con éxito para AWS Lambda!"

      - name: Desplegar en AWS Lambda
        working-directory: ./UsuarioEcommerce-main/UsuarioEcommerce-main/usuarios/usuarios
        run: |
          echo "Subiendo archivo comprimido a AWS Lambda..."
          
          aws lambda update-function-code \
            --function-name deploy-usuarios-lambda \
            --zip-file fileb://target/lambda_deploy.zip \
            --region us-east-1