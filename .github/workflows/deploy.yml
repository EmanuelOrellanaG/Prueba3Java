name: Deploy Usuarios

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted  # Usa tu servidor EC2 Ubuntu

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Compilar proyecto con Maven
        # Nos movemos a la carpeta exacta donde está el pom.xml
        working-directory: ./UsuarioEcommerce-main/UsuarioEcommerce-main/usuarios/usuarios
        run: mvn clean package -DskipTests

      - name: Desplegar en AWS Lambda
        # Nos movemos a la misma carpeta para buscar el archivo .jar generado
        working-directory: ./UsuarioEcommerce-main/UsuarioEcommerce-main/usuarios/usuarios
        run: |
          JAR_FILE=$(ls target/*.jar | head -n 1)
          echo "Subiendo archivo: $JAR_FILE"
          
          aws lambda update-function-code \
            --function-name deploy-usuarios-lambda \
            --zip-file fileb://$JAR_FILE \
            --region us-east-1